name: Build and Release PeerBanHelper

on:
  workflow_dispatch:
    inputs:
      version:
        description: '要构建的版本号（如 v9.2.5）'
        required: false
        type: string
  schedule:
    - cron: '0 0 * * *'
  push:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  check-upstream:
    runs-on: ubuntu-latest
    outputs:
      latest-version: ${{ steps.check.outputs.version }}
      should-build: ${{ steps.check.outputs.should_build }}
    steps:
      - name: 检查上游 PeerBanHelper 最新版本
        id: check
        run: |
          UPSTREAM_REPO="PBH-BTN/PeerBanHelper"
          
          # 增加 Token 避免速率限制
          LATEST_TAG=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/repos/${UPSTREAM_REPO}/releases/latest | jq -r '.tag_name')

          if [ -z "$LATEST_TAG" ] || [ "$LATEST_TAG" == "null" ]; then
            LATEST_TAG=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              https://api.github.com/repos/${UPSTREAM_REPO}/tags | jq -r '.[0].name')
          fi

          echo "version=$LATEST_TAG" >> $GITHUB_OUTPUT

          if [ "${{ github.event_name }}" == "schedule" ]; then
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              https://api.github.com/repos/${{ github.repository }}/releases/tags/${LATEST_TAG})
            
            if [ "$HTTP_STATUS" -eq 404 ]; then
              echo "should_build=true" >> $GITHUB_OUTPUT
              echo "检测到新版本: $LATEST_TAG"
            else
              echo "should_build=false" >> $GITHUB_OUTPUT
              echo "版本 $LATEST_TAG 已存在，跳过"
            fi
          else
            echo "should_build=true" >> $GITHUB_OUTPUT
          fi

  build:
    needs: check-upstream
    if: needs.check-upstream.outputs.should-build == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置版本变量
        id: version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ] && [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION_TAG="${{ github.event.inputs.version }}"
          else
            VERSION_TAG="${{ needs.check-upstream.outputs.latest-version }}"
          fi
          
          [[ ! "$VERSION_TAG" =~ ^v ]] && VERSION_TAG="v${VERSION_TAG}"
          VERSION_NUMBER=${VERSION_TAG#v}
          
          echo "VERSION_TAG=$VERSION_TAG" >> $GITHUB_ENV
          echo "VERSION_NUMBER=$VERSION_NUMBER" >> $GITHUB_ENV
          echo "IMAGE=ghostchu/peerbanhelper:${VERSION_TAG}" >> $GITHUB_ENV

      - name: 准备构建环境
        run: |
          sudo mkdir -p /usr/local/bin
          sudo chmod 755 /usr/local/bin

      - name: 执行构建脚本 (inline)
        env:
          IMAGE: ${{ env.IMAGE }}
          PBH_VERSION: ${{ env.VERSION_NUMBER }}
        run: |
          set -euo pipefail
          # 确保文件存在再替换，防止 sed 报错
          [ -f app/docker/docker-compose.yaml ] && sed -i "s#@IMAGE@#${IMAGE}#g" app/docker/docker-compose.yaml
          [ -f manifest ] && sed -i "s#@PBH_VERSION@#${PBH_VERSION}#g" manifest

          curl -s -L -f -o /usr/local/bin/fnpack "https://static2.fnnas.com/fnpack/fnpack-1.2.1-linux-amd64"
          sudo chmod +x /usr/local/bin/fnpack
          
          fnpack build
          FPK_FILE=$(ls *.fpk | head -1)
          mv "${FPK_FILE}" "peerbanhelper-${PBH_VERSION}.fpk"

      - name: 创建或更新 Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ env.VERSION_TAG }}
          name: PeerBanHelper ${{ env.VERSION_TAG }}
          body: |
            自动同步上游版本: ${{ env.VERSION_TAG }}
          files: peerbanhelper-${{ env.VERSION_NUMBER }}.fpk
          overwrite: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
